services:
  textgrab:
    image: ghcr.io/therepos/textgrab:latest
    container_name: textgrab
    ports:
      - "3020:8000"
    volumes:
      - /mnt/sec/apps/textgrab/data:/data/models
    environment:
      # optional: server-side vision API key
      - ANTHROPIC_API_KEY=   
      # optional: passphrase to gate server key usage     
      - VISION_ACCESS_CODE=       
    restart: unless-stopped
    security_opt:
      - apparmor=unconfined
      - seccomp=unconfined
    labels:
      - "com.centurylinklabs.watchtower.enable=true"